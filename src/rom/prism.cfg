MEMORY
{
    ZP:     start = $0080, size = $007F, type = rw, define = yes;
    RAM:    start = $0200, size = $7168, define = yes;
    ROM:    start = $E000, size = $2000, file = %O;
}

SEGMENTS
{
    ZEROPAGE:  load = ZP,  type = zp,  define   = yes;
    BSS:       load = RAM, type = bss, define   = yes;
    HEAP:      load = RAM, type = bss, optional = yes;

    BIOSJMP:   load = ROM, type = ro,  start = $E000;  # BIOS Jump Table
    BIOS:      load = ROM, type = ro,  start = $E100;

    RODATA:    load = ROM, type = ro,  optional = yes;
    
    N_VECTORS: load = ROM, type = ro,  start = $FFE0;  # Native mode vectors
    E_VECTORS: load = ROM, type = ro,  start = $FFF0;  # Emulation mode vectors
}
